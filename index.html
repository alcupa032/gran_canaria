<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itinerario Gran Canaria</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: #f4f6f8;
  color: #111;
}

h1 {
  text-align: center;
  font-size: 21px;
  margin: 14px 10px 6px;
}

.subtitle {
  text-align: center;
  font-size: 13px;
  color: #666;
  margin-bottom: 12px;
}

.container {
  width: 94%;
  max-width: 760px;
  margin: auto;
}

/* BOTONES ARRIBA */
.quick-actions {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}

.quick-btn {
  border: none;
  background: white;
  padding: 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
}

/* CARDS */
.card { margin: 12px 0; border-radius: 16px; overflow: hidden; color: white; }
.header { padding: 14px; font-weight: bold; cursor: pointer; }

.content {
  max-height: 0;
  overflow: hidden;
  background: white;
  color: black;
  transition: 0.4s;
  padding: 0 12px;
}

.content.open { max-height: 3000px; padding: 12px; }

.place {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}

.nav-btn {
  background: black;
  color: white;
  border-radius: 999px;
  padding: 6px 10px;
  border: none;
  font-size: 12px;
  font-weight: bold;
}

img {
  width: 100%;
  border-radius: 12px;
  margin-top: 8px;
}

/* colores */
.blue { background:#3498db }
.orange { background:#e67e22 }
.green { background:#27ae60 }
.purple { background:#8e44ad }
.gray { background:#7f8c8d }

/* BOTÓN MAPA NEGRO */
.map-small-btn {
  display: block;
  margin: 30px auto;
  background: black;
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 999px;
  font-weight: bold;
}

/* OVERLAY MAPA */
.map-overlay {
  position: fixed;
  inset:0;
  background:white;
  display:none;
}

.map-overlay.active { display:block; }

.map-overlay iframe {
  width:100%;
  height:100%;
  border:0;
}

/* BOTÓN CERRAR ROJO DERECHA + BAJADO */
.close-map {
  position:absolute;
  top:70px; /* lo bajamos */
  right:12px; /* derecha */
  background:#c0392b;
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
}

</style>
</head>

<body>

<h1>🌴 Itinerario Gran Canaria</h1>
<div class="subtitle">24–28 junio · Telde</div>

<!-- BOTONES ARRIBA -->
<div class="container">
<div class="quick-actions">

<button class="quick-btn" onclick="openChoice(event,'Aeropuerto Barcelona',41.2971,2.0785)">
✈️ BCN
</button>

<button class="quick-btn" onclick="openChoice(event,'Apartamento Telde',27.9967,-15.4178)">
🏠 Apartamento
</button>

<button class="quick-btn" onclick="openChoice(event,'Aeropuerto Gran Canaria',27.9319,-15.3866)">
✈️ Canarias
</button>

</div>

<!-- DIA 24 -->
<div class="card blue">
<div class="header" onclick="toggleCard(this)">Día 24</div>
<div class="content">

<div class="place">
<span>Guayadeque</span>
<button class="nav-btn" onclick="openChoice(event,'Guayadeque',27.9146,-15.4752)">Ir</button>
</div>

<img src="guayadeque.jpg">
<img src="Tufia1.jpg">
<img src="melenara.jpg">

</div>
</div>

<!-- DIA 25 -->
<div class="card orange">
<div class="header" onclick="toggleCard(this)">Día 25</div>
<div class="content">

<div class="place">
<span>Puerto de Mogán</span>
<button class="nav-btn" onclick="openChoice(event,'Puerto de Mogán',27.8195,-15.7657)">Ir</button>
</div>

<img src="puerto-de-mogan-1.jpg">
<img src="dunas-maspalomas.jpg">

</div>
</div>

<!-- DIA 26 -->
<div class="card green">
<div class="header" onclick="toggleCard(this)">Día 26</div>
<div class="content">

<div class="place">
<span>Roque Nublo</span>
<button class="nav-btn" onclick="openChoice(event,'Roque Nublo',27.9680,-15.6114)">Ir</button>
</div>

<img src="ROQUE1.jpg">
<img src="barranco_vacas.jpeg">

</div>
</div>

<!-- DIA 27 -->
<div class="card purple">
<div class="header" onclick="toggleCard(this)">Día 27</div>
<div class="content">

<img src="melenara.jpg">

</div>
</div>

<!-- BOTÓN MAPA -->
<button class="map-small-btn" onclick="openMap()">📍 Ver mapa completo</button>

</div>

<!-- MAPA FULLSCREEN -->
<div id="mapOverlay" class="map-overlay">
<button class="close-map" onclick="closeMap()">✖</button>

<iframe src="https://www.google.com/maps/d/embed?mid=1os-FhXIlNcwsAIcTtamjToIzm9dnAFs"></iframe>

</div>

<script>

function toggleCard(el){
  el.nextElementSibling.classList.toggle("open");
}

function openMap(){
  document.getElementById("mapOverlay").classList.add("active");
}

function closeMap(){
  document.getElementById("mapOverlay").classList.remove("active");
}

function openChoice(e,place,lat,lng){
  e.stopPropagation();

  window.location.href =
  "https://www.waze.com/ul?ll="+lat+","+lng+"&navigate=yes";
}

</script>

</body>
</html>
